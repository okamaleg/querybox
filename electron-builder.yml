appId: com.querybox.app
productName: Querybox
directories:
  output: release
files:
  - dist-electron/**/*
  - dist/**/*
  - dist-server/**/*
  - public/**/*
  - server/**/*
  - node_modules/**/*
  - package.json
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: public/icon.png
  category: public.app-category.developer-tools
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/icon.png
linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: public/icon.png
  category: Development
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: okamaleg
  repo: querybox
